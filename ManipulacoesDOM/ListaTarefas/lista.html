<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista Dinâmica</title>
  <link rel="stylesheet" href="/lista.css">
</head>
<body>
    <div id="caixa">
      <h1 id="titulo">Lista de Tarefas</h1>
      
      <input type="text" id="input-tarefa" placeholder="Digite uma tarefa">

      <div id="caixa-botoes">
        <button id="botao-adicionar">➕ Adicionar Tarefa</button>
        <button id="botao-limpar">Limpar Tudo 🗑️</button>
      </div>
      
      <p id="contador">Tarefas: 0</p>
      
      <ul id="lista"></ul>
    </div>
    <script src="/lista.js"></script>
</body>
</html>
