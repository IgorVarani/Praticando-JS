<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Produtos</title>
    <link rel="stylesheet" href="/busca.css">
    <script src="/busca.js" defer></script>

</head>
<body>

<h1>Buscar Produtos</h1>

<label for="codigo" id="label-codigo">Código:</label>
<input type="number" id="input-codigo" placeholder="Digite o código númerico">
<button id="botao-buscar">Buscar</button>

<form id="exibicao">

    <label for="nome">Nome:</label>
    <input type="text" id="nome">
    
    <label for="preco">Preço:</label>
    <input type="text" id="preco">

    <label for="categoria">Categoria:</label>
    <input type="text" id="categoria">

</form>

</body>
</html>
